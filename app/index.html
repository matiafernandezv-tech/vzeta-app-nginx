<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VZeta - Optimización de Despliegue</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            color: #0066cc;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #666;
        }
        .badge {
            background-color: #28a745;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Empresa VZeta</h1>
        <p>¡Despliegue de Examen Transversal Exitoso!</p>
        <p>Esta aplicación web (`myapp_container`) está corriendo detrás de un proxy inverso NGINX (`mynginx_container`) de manera segura y eficiente.</p>
        <span class="badge">CD: GitHub Actions Activo</span>
    </div>

</body>
</html>
